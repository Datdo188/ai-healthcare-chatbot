services:
  ollama:
    image: ollama/ollama:latest
    container_name: ai-healthcare-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-healthcare-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data: